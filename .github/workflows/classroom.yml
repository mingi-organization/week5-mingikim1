name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: test1-1
      id: test1-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test1-1
        setup-command: gcc code/1-1.c -o code/1-1.exe
        command: "./code/1-1.exe"
        input: '1 2 3 4 5

          '
        expected-output: |
          2
          4
          6
          8
          10
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test1-2
      id: test1-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test1-2
        setup-command: gcc code/1-2.c -o code/1-2.exe
        command: "./code/1-2.exe"
        input: ''
        expected-output: '90

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test1-3
      id: test1-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test1-3
        setup-command: gcc code/1-3.c -o code/1-3.exe
        command: "./code/1-3.exe"
        input: ''
        expected-output: '5 4 3 2 1

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test2-1
      id: test2-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test2-1
        setup-command: gcc code/2-1.c -o code/2-1.exe
        command: "./code/2-1.exe"
        input: ''
        expected-output: |
          abc
          def
          hij
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test2-2
      id: test2-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test2-2
        setup-command: gcc code/2-2.c -o code/2-2.exe
        command: "./code/2-2.exe"
        input: ''
        expected-output: |
          ant
          apple
          banana
          cherry
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test2-3
      id: test2-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test2-3
        setup-command: gcc code/2-3.c -o code/2-3.exe
        command: "./code/2-3.exe"
        input: ''
        expected-output: |
          0
          8
          16
          24
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test2-4
      id: test2-4
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test2-4
        setup-command: gcc code/2-4.c -o code/2-4.exe
        command: "./code/2-4.exe"
        input: ''
        expected-output: '2026 hello

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test3-1
      id: test3-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test3-1
        setup-command: gcc code/3-1.c -o code/3-1.exe
        command: "./code/3-1.exe"
        input: ''
        expected-output: |
          10
          20
          30
          40
          50
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test3-2
      id: test3-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test3-2
        setup-command: gcc code/3-2.c -o code/3-2.exe
        command: "./code/3-2.exe"
        input: ''
        expected-output: |
          10
          20
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test3-3
      id: test3-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test3-3
        setup-command: gcc code/4-3.c -o code/4-3.exe
        command: "./code/4-3.exe"
        input: ''
        expected-output: '7

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-1
      id: test4-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-1
        setup-command: gcc code/4-1.c -o code/4-1.exe
        command: "./code/4-1.exe"
        input: 'AAAAA

          '
        expected-output: 'AAAA

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-2
      id: test4-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-2
        setup-command: gcc code/4-2.c -o code/4-2.exe
        command: "./code/4-2.exe"
        input: 'AAAAA

          '
        expected-output: 'AAAA

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-3-1
      id: test4-3-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-3-1
        setup-command: gcc code/4-3.c -o code/4-3.exe
        command: "./code/4-3.exe"
        input: '100

          '
        expected-output: 'Error!

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-3-2
      id: test4-3-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-3-2
        setup-command: gcc code/4-3.c -o code/4-3.exe
        command: "./code/4-3.exe"
        input: '3

          '
        expected-output: '40

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST1-1_RESULTS: "${{steps.test1-1.outputs.result}}"
        TEST1-2_RESULTS: "${{steps.test1-2.outputs.result}}"
        TEST1-3_RESULTS: "${{steps.test1-3.outputs.result}}"
        TEST2-1_RESULTS: "${{steps.test2-1.outputs.result}}"
        TEST2-2_RESULTS: "${{steps.test2-2.outputs.result}}"
        TEST2-3_RESULTS: "${{steps.test2-3.outputs.result}}"
        TEST2-4_RESULTS: "${{steps.test2-4.outputs.result}}"
        TEST3-1_RESULTS: "${{steps.test3-1.outputs.result}}"
        TEST3-2_RESULTS: "${{steps.test3-2.outputs.result}}"
        TEST3-3_RESULTS: "${{steps.test3-3.outputs.result}}"
        TEST4-1_RESULTS: "${{steps.test4-1.outputs.result}}"
        TEST4-2_RESULTS: "${{steps.test4-2.outputs.result}}"
        TEST4-3-1_RESULTS: "${{steps.test4-3-1.outputs.result}}"
        TEST4-3-2_RESULTS: "${{steps.test4-3-2.outputs.result}}"
      with:
        runners: test1-1,test1-2,test1-3,test2-1,test2-2,test2-3,test2-4,test3-1,test3-2,test3-3,test4-1,test4-2,test4-3-1,test4-3-2
